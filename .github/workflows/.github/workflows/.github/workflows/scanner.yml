name: Scanner SMA CEDEARs

on:
  schedule:
    # Corre cada 30 minutos, en horario de mercado USA (9:30-16:00 ET = 14:30-21:00 UTC aprox)
    # Cron usa UTC siempre
    - cron: '0,30 14-21 * * 1-5'
  workflow_dispatch:
    # Permite tambien correrlo manualmente desde GitHub con un click

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install yfinance pandas numpy requests

      - name: Correr scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scanner_final.py

      - name: Subir resultados como artifact
        uses: actions/upload-artifact@v4
        with:
          name: scanner-resultados
          path: scanner_resultados.csv
          retention-days: 30
